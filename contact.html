<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T4OHIO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="placeholder-images/favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    </style>
</head>
<body>
    <div class="hero">
        <video autoplay muted loop id="myVideo">
            <source src="placeholder-images/whole.mp4" type="video/mp4">
            <!-- You can add other formats like WebM for wider support -->
            <!-- <source src="your-video.webm" type="video/webm"> -->
            Your browser does not support HTML5 video.
        </video>
        <img id="logo" src="placeholder-images/logo.png">
        <div class="nav-bar">
            <h3 id="menu"><a href="https://emilyahmad.github.io/T4OHIO/menu.html">Menu</a></h3>
            <h3 id="order"><a href="https://emilyahmad.github.io/T4OHIO/orerNow.html">Order Now</a></h3>
            <h3 id="phil">Philosophy</h3>
            <h3 id="contact">Contact Us</h3>
            <h3 id="sign"><a href="https://emilyahmad.github.io/T4OHIO/accounts.html">Sign In</a></h3>
        </div>
        <h1 id="title">Contact Us</h1>
        <img id="pauseButton" src="placeholder-images/pauseButton.png">
        <img id="playButton" src="placeholder-images/playButton.png">
    </div>
    <section id="menu-start">
        <h2 id="top-h2">Get in Touch</h2>
        <div class="contact-container">
            <form id="contact-form">
                <label for="fname">First name:</label><br>
                <input type="text" id="fname" name="fname"><br>
                <label for="lname">Last name:</label><br>
                <input type="text" id="lname" name="lname">
                <input for="email">Email:</label><br>
                <input type="text" id="email" name="email"><br>
                <input for="message">Message:</label><br>
                <input type="text" id="message" name="message"><br>
            </form>
            <button id="submit-button">Submit</button>
        </div>
    </section>
    <script src="script.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T4OHIO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="placeholder-images/favicon.ico" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    </style>
</head>
<body>
    <div class="hero">
        <video autoplay muted loop id="myVideo">
            <source src="placeholder-images/whole.mp4" type="video/mp4">
            <!-- You can add other formats like WebM for wider support -->
            <!-- <source src="your-video.webm" type="video/webm"> -->
            Your browser does not support HTML5 video.
        </video>
        <img id="logo" src="placeholder-images/logo.png">
        <div class="nav-bar">
            <h3 id="menu"><a href="https://emilyahmad.github.io/T4OHIO/menu.html">Menu</a></h3>
            <h3 id="order"><a href="https://emilyahmad.github.io/T4OHIO/orerNow.html">Order Now</a></h3>
            <h3 id="phil">Philosophy</h3>
            <h3 id="contact">Contact Us</h3>
            <h3 id="sign"><a href="https://emilyahmad.github.io/T4OHIO/accounts.html">Sign In</a></h3>
        </div>
        <h1 id="title">Contact Us</h1>
        <img id="pauseButton" src="placeholder-images/pauseButton.png">
        <img id="playButton" src="placeholder-images/playButton.png">
    </div>
    <section id="menu-start">
        <div class="contact-container">
            <h2 id="top-h2">Get in Touch</h2>
            <form id="contact-form">
                <div id="name">
                    <div id="name2">
                        <label>First Name:</label>
                        <input type="text" id="fname" name="fname" required placeholder="e.g. Jane">
                    </div>
                    <div id="name2">
                        <label>Last Name:</label>
                        <input type="text" id="lname" name="lname" required placeholder="e.g. Doe">
                    </div>
                </div>
                <label>Email:</label>
                <input type="email" id="email" name="email" required placeholder="e.g. janedoe@gmail.com">
                <label>Message:</label>
                <textarea id="message" rows="4" cols="50" required></textarea>
                <button id="submit-button">Submit</button>
            </form>
            <div class="form-complete">
            <h2 id="h2-contact">Thank you for contacting us! Your message has been sent and we will email you shortly regarding your message!</h2>
            <button id="submit-another">Submit Another</button>
        </div>
        </div>
    </section>
    <script src="script.js"></script>
    <script>
        let isDirty = false;
        var form = document.getElementById("contact-form");
        form.querySelectorAll("input", "textArea").forEach(input => {
            input.addEventListener("input", () =>{
                isDirty = true;
            });
        });
        window.addEventListener("beforeunload", function(e){
            if(isDirty){
                e.preventDefault();
                e.returnValue = "";
            }
        });
        form.addEventListener('submit', function(event){
            event.preventDefault();
            form.style.display = "none";
            document.querySelector(".form-complete").style.display = "flex";
            form.reset();
            isDirty = false;
        });

        var submitAnother = document.getElementById("submit-another");
        submitAnother.addEventListener("click", function(){
            form.style.display = "flex";
            document.querySelector(".form-complete").style.display = "none";
        });
    </script>
</body>
